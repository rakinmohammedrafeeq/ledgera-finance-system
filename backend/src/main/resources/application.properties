# ============================================================
# Ledgera Finance System - Application Configuration
# ============================================================

spring.application.name=Ledgera

# ------------------------------------------------------------
# PostgreSQL Configuration (Primary)
# ------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/ledgera_db
spring.datasource.username=postgres
spring.datasource.password=dbms
spring.datasource.driver-class-name=org.postgresql.Driver

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ------------------------------------------------------------
# JWT Configuration
# ------------------------------------------------------------
jwt.secret=Ledgera2024SecretKeyForJWTAuthenticationHS256AlgorithmRequiresAtLeast256BitsLong
jwt.expiration=86400000

# ------------------------------------------------------------
# Server
# ------------------------------------------------------------
server.port=8080

# ------------------------------------------------------------
# Flyway Configuration
# ------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
